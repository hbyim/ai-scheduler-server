<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>마이니치 단어장</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="study-panel" aria-label="오늘의 일본어 단어">
        <header class="hero">
          <div>
            <p class="eyebrow">Daily Japanese</p>
            <h1>마이니치 단어장</h1>
            <p class="hero-copy">오늘 외울 일본어 단어 10개와 자연스러운 예문을 매일 새로 추천합니다.</p>
          </div>
          <div class="date-card" aria-label="오늘 날짜">
            <span id="monthLabel">--</span>
            <strong id="dayLabel">--</strong>
          </div>
        </header>

        <section class="toolbar" aria-label="학습 제어">
          <div class="progress-wrap">
            <span id="progressText">0 / 10 완료</span>
            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>

          <div class="toolbar-actions">
            <button class="icon-button" id="speakAllButton" type="button" aria-label="오늘 단어 모두 듣기" title="오늘 단어 모두 듣기">▶</button>
            <button class="icon-button" id="shuffleButton" type="button" aria-label="다른 추천 보기" title="다른 추천 보기">↻</button>
            <button class="icon-button" id="resetButton" type="button" aria-label="완료 표시 초기화" title="완료 표시 초기화">×</button>
          </div>
        </section>

        <section class="focus-card" id="focusCard" aria-label="선택한 단어">
          <div>
            <p class="eyebrow" id="focusLevel">N5</p>
            <h2>
              <span id="focusJapanese">日本語</span>
              <span id="focusReading">にほんご</span>
            </h2>
            <p class="meaning" id="focusMeaning">일본어</p>
          </div>
          <button class="speak-button" id="focusSpeakButton" type="button">발음 듣기</button>
        </section>

        <section class="word-grid" id="wordGrid" aria-label="추천 단어 목록"></section>
      </section>

      <aside class="practice-panel" aria-label="예문과 복습">
        <section class="example-section">
          <div class="section-heading">
            <p class="eyebrow">Example</p>
            <h2>예문으로 익히기</h2>
          </div>
          <article class="example-card">
            <p class="jp-sentence" id="exampleJapanese"></p>
            <p class="reading-line" id="exampleReading"></p>
            <p class="translation-line" id="exampleKorean"></p>
            <button class="ghost-button" id="exampleSpeakButton" type="button">예문 듣기</button>
          </article>
        </section>

        <section class="quiz-section">
          <div class="section-heading">
            <p class="eyebrow">Quick Check</p>
            <h2>뜻 맞히기</h2>
          </div>
          <div class="quiz-card">
            <p id="quizPrompt"></p>
            <div class="choice-grid" id="choiceGrid"></div>
            <p class="feedback" id="feedback" aria-live="polite"></p>
          </div>
        </section>

        <section class="tip-section">
          <div class="section-heading">
            <p class="eyebrow">Voice</p>
            <h2>발음 설정</h2>
          </div>
          <label class="select-label">
            일본어 음성
            <select id="voiceSelect"></select>
          </label>
          <p class="support-note" id="supportNote">브라우저 음성 합성 기능으로 발음을 재생합니다.</p>
        </section>
      </aside>
    </main>

    <template id="wordTemplate">
      <article class="word-card">
        <button class="word-main" type="button">
          <span class="word-number"></span>
          <span>
            <strong class="word-japanese"></strong>
            <small class="word-reading"></small>
          </span>
        </button>
        <div class="word-actions">
          <button class="mini-button speak-word" type="button" aria-label="단어 발음 듣기" title="단어 발음 듣기">▶</button>
          <label class="done-check">
            <input class="done-input" type="checkbox">
            <span>완료</span>
          </label>
        </div>
        <p class="word-meaning"></p>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
