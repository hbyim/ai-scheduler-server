<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 일정관리</title>
<style>
  :root {
    --bg: #fafafa; --surface: #ffffff; --border: #e8e8e8;
    --text: #1a1a1a; --text-muted: #8a8a8a;
    --accent: #3b5bdb; --accent-light: #eef2ff;
    --high: #e03131; --high-bg: #fff5f5;
    --mid: #f59f00; --mid-bg: #fffbeb;
    --low: #2f9e44; --low-bg: #f4fce3;
    --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

  .app { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }
  .header { grid-column: 1/-1; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--surface); position: relative; z-index: 10; }
  .header h1 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .save-status { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--low); display: inline-block; transition: background 0.3s; }
  .save-dot.saving { background: var(--mid); }
  .save-dot.error { background: var(--high); }
  .sidebar { border-right: 1px solid var(--border); background: var(--surface); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  .main { overflow-y: auto; padding: 20px; }

  .btn { padding: 7px 14px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:not(:disabled):hover { background: #2f4cbf; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:not(:disabled):hover { background: var(--bg); color: var(--text); }
  .btn-danger { color: var(--high) !important; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; padding: 0; background: transparent; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.15s; }
  .btn-icon:hover { background: var(--bg); }

  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 10px; }
  .mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .mini-cal-month { font-weight: 600; font-size: 13px; }
  .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
  .mini-cal-dow { font-size: 10px; color: var(--text-muted); padding: 3px 0; font-weight: 500; }
  .mini-cal-day { font-size: 12px; padding: 5px 3px; border-radius: 6px; cursor: pointer; transition: all 0.15s; position: relative; }
  .mini-cal-day:hover { background: var(--accent-light); }
  .mini-cal-day.today { background: var(--accent); color: white; font-weight: 600; }
  .mini-cal-day.selected { background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .mini-cal-day.has-event::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .mini-cal-day.today::after { background: white; }
  .mini-cal-day.other-month { color: var(--text-muted); opacity: 0.5; }

  .ai-card { background: linear-gradient(135deg, var(--accent-light), #f0f4ff); border: 1px solid #c5d2fc; border-radius: var(--radius); padding: 12px; }
  .ai-card-title { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
  .ai-card-body { font-size: 12px; color: #374499; line-height: 1.6; }
  .reco-item { display: flex; align-items: flex-start; gap: 6px; padding: 6px 0; border-bottom: 1px solid rgba(59,91,219,0.1); font-size: 12px; color: #374499; }
  .reco-item:last-child { border-bottom: none; }

  .view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .view-title { font-size: 18px; font-weight: 600; }
  .view-tabs { display: flex; gap: 2px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 2px; }
  .view-tab { padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; border: none; background: none; }
  .view-tab.active { background: white; color: var(--text); box-shadow: var(--shadow); }
  .view-nav { display: flex; align-items: center; gap: 6px; }

  .day-view { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: auto; max-height: calc(100vh - 140px); }
  .day-grid { display: grid; grid-template-columns: 50px 1fr; min-width: 400px; }
  .day-time-col { border-right: 1px solid var(--border); }
  .day-time-slot { height: 60px; display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 8px; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .day-events-col { position: relative; }
  .day-hour-row { height: 60px; border-bottom: 1px solid var(--border); position: relative; cursor: pointer; transition: background 0.1s; }
  .day-hour-row:hover { background: var(--accent-light); }
  .event-block { position: absolute; left: 4px; right: 4px; border-radius: 6px; padding: 3px 7px; font-size: 12px; font-weight: 500; overflow: hidden; cursor: pointer; z-index: 1; transition: opacity 0.15s; }
  .event-block:hover { opacity: 0.85; }
  .event-block.priority-high { background: var(--high-bg); border-left: 3px solid var(--high); color: var(--high); }
  .event-block.priority-mid { background: var(--mid-bg); border-left: 3px solid var(--mid); color: #b76400; }
  .event-block.priority-low { background: var(--low-bg); border-left: 3px solid var(--low); color: var(--low); }

  .week-grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: auto; max-height: calc(100vh - 140px); }
  .week-header-cell { text-align: center; padding: 10px 4px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); font-size: 12px; position: sticky; top: 0; background: white; z-index: 2; }
  .week-header-cell .dow { color: var(--text-muted); font-weight: 500; font-size: 11px; }
  .week-header-cell .date-num { font-size: 18px; font-weight: 300; margin-top: 2px; line-height: 1; }
  .week-header-cell.is-today .date-num { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 2px auto 0; font-size: 15px; font-weight: 600; }
  .week-time-cell { font-size: 11px; color: var(--text-muted); text-align: right; padding: 4px 6px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); height: 52px; display: flex; align-items: flex-start; justify-content: flex-end; }
  .week-day-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); height: 52px; position: relative; cursor: pointer; transition: background 0.1s; }
  .week-day-cell:hover { background: var(--accent-light); }
  .week-day-cell:last-child { border-right: none; }
  .week-event { position: absolute; inset: 2px; border-radius: 4px; padding: 2px 5px; font-size: 10px; font-weight: 500; overflow: hidden; cursor: pointer; }
  .week-event.priority-high { background: var(--high-bg); color: var(--high); border-left: 2px solid var(--high); }
  .week-event.priority-mid { background: var(--mid-bg); color: #b76400; border-left: 2px solid var(--mid); }
  .week-event.priority-low { background: var(--low-bg); color: var(--low); border-left: 2px solid var(--low); }

  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .month-dow { background: var(--surface); text-align: center; padding: 8px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .month-day { background: var(--surface); min-height: 90px; padding: 6px; cursor: pointer; transition: background 0.1s; }
  .month-day:hover { background: var(--accent-light); }
  .month-day.other-month { background: var(--bg); }
  .month-day.is-today .day-num { background: var(--accent); color: white; border-radius: 50%; }
  .day-num { font-size: 12px; font-weight: 500; margin-bottom: 4px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
  .month-event { font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: pointer; }
  .month-event.priority-high { background: var(--high-bg); color: var(--high); }
  .month-event.priority-mid { background: var(--mid-bg); color: #b76400; }
  .month-event.priority-low { background: var(--low-bg); color: var(--low); }
  .more-events { font-size: 10px; color: var(--text-muted); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: white; border-radius: 14px; width: 460px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.15); animation: slideUp 0.2s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: white; z-index: 1; }
  .modal-header h2 { font-size: 15px; font-weight: 600; }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; position: sticky; bottom: 0; background: white; }

  .nl-input-wrap { background: var(--accent-light); border: 1.5px solid #c5d2fc; border-radius: var(--radius); padding: 10px 12px; }
  .nl-label { font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
  .nl-input { width: 100%; border: none; background: transparent; font-size: 13px; color: var(--text); outline: none; resize: none; font-family: inherit; }
  .nl-hint { font-size: 11px; color: #6e8eec; margin-top: 5px; }
  .nl-parse-result { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 12px; color: var(--text-muted); margin-top: 6px; display: none; }
  .divider { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 11px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .form-input { padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); transition: border 0.15s; width: 100%; }
  .form-input:focus { outline: none; border-color: var(--accent); background: white; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .priority-selector { display: flex; gap: 6px; }
  .priority-btn { flex: 1; padding: 7px; border-radius: 8px; border: 1.5px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; background: none; }
  .priority-btn.high { color: var(--high); }
  .priority-btn.high.active { background: var(--high-bg); border-color: var(--high); }
  .priority-btn.mid { color: #b76400; }
  .priority-btn.mid.active { background: var(--mid-bg); border-color: var(--mid); }
  .priority-btn.low { color: var(--low); }
  .priority-btn.low.active { background: var(--low-bg); border-color: var(--low); }

  .event-detail-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .detail-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .detail-row:last-child { border: none; }
  .detail-icon { font-size: 16px; flex-shrink: 0; }
  .detail-label { color: var(--text-muted); font-size: 11px; margin-bottom: 2px; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 10px 18px; border-radius: 20px; font-size: 13px; z-index: 300; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); animation: toastIn 0.2s ease; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile responsive */
  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; }
    .sidebar { display: none; }
    .main { padding: 12px; }
    .view-title { font-size: 15px; }
    .header-actions .btn-ghost { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>📅 AI 일정관리</h1>
    <div class="header-actions">
      <span class="save-status" id="saveStatus"><span class="save-dot" id="saveDot"></span> <span id="saveText">연결 중...</span></span>
      <button class="btn btn-primary" onclick="openAddModal()">+ 일정 추가</button>
    </div>
  </header>

  <aside class="sidebar">
    <div>
      <div class="section-title">📆 캘린더</div>
      <div class="mini-cal-header">
        <button class="btn-icon" onclick="miniCalPrev()">‹</button>
        <span class="mini-cal-month" id="miniCalMonth"></span>
        <button class="btn-icon" onclick="miniCalNext()">›</button>
      </div>
      <div class="mini-cal-grid" id="miniCalGrid"></div>
    </div>
    <div>
      <div class="section-title">🤖 AI 요약</div>
      <div class="ai-card">
        <div class="ai-card-title">✨ 오늘의 일정 분석</div>
        <div class="ai-card-body" id="aiSummaryText">로딩 중...</div>
      </div>
    </div>
    <div>
      <div class="section-title">💡 AI 추천</div>
      <div class="ai-card">
        <div class="ai-card-title">🎯 최적 시간 제안</div>
        <div class="ai-card-body" id="aiRecoText">분석 중...</div>
      </div>
    </div>
    <div>
      <div class="section-title">📊 우선순위 현황</div>
      <div id="priorityBreakdown" style="font-size:12px;"></div>
    </div>
  </aside>

  <main class="main">
    <div class="view-header">
      <div class="view-nav">
        <button class="btn-icon" onclick="navigatePrev()">‹</button>
        <h2 class="view-title" id="viewTitle"></h2>
        <button class="btn-icon" onclick="navigateNext()">›</button>
        <button class="btn btn-ghost btn-sm" onclick="goToday()">오늘</button>
      </div>
      <div class="view-tabs">
        <button class="view-tab" onclick="setView('month')" id="tab-month">월</button>
        <button class="view-tab active" onclick="setView('week')" id="tab-week">주</button>
        <button class="view-tab" onclick="setView('day')" id="tab-day">일</button>
      </div>
    </div>
    <div id="calendarView"></div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal" style="display:none" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">일정 추가</h2>
      <button class="btn-icon" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="nl-input-wrap">
        <div class="nl-label">✨ AI 자동 파싱</div>
        <textarea class="nl-input" id="nlInput" rows="2" placeholder="예: 내일 오후 3시에 팀 회의 1시간"></textarea>
        <div class="nl-hint">💡 자연어로 입력하면 AI가 자동으로 분석합니다</div>
        <button class="btn btn-sm" style="margin-top:8px;background:var(--accent);color:white;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;" onclick="parseNL()">✨ 파싱하기</button>
        <div class="nl-parse-result" id="nlParseResult"></div>
      </div>
      <div class="divider">또는 직접 입력</div>
      <div class="form-group">
        <label class="form-label">제목 *</label>
        <input type="text" class="form-input" id="eventTitle" placeholder="일정 제목">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">날짜 *</label>
          <input type="date" class="form-input" id="eventDate">
        </div>
        <div class="form-group">
          <label class="form-label">시작 시간</label>
          <input type="time" class="form-input" id="eventTime">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">종료 시간</label>
          <input type="time" class="form-input" id="eventEndTime">
        </div>
        <div class="form-group">
          <label class="form-label">장소</label>
          <input type="text" class="form-input" id="eventLocation" placeholder="선택사항">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">🤖 우선순위 <span style="color:var(--accent);font-size:11px;">(AI 자동 분류)</span></label>
        <div class="priority-selector">
          <button class="priority-btn high" onclick="selectPriority('high')" id="pri-high">🔴 높음</button>
          <button class="priority-btn mid active" onclick="selectPriority('mid')" id="pri-mid">🟡 중간</button>
          <button class="priority-btn low" onclick="selectPriority('low')" id="pri-low">🟢 낮음</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <input type="text" class="form-input" id="eventNote" placeholder="간단한 메모 (선택)">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">취소</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" style="display:none" onclick="closeModalOnOverlay(event)">
  <div class="modal" style="width:400px;">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
        <span id="detailTag" class="event-detail-tag"></span>
        <h2 id="detailTitle" style="font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></h2>
      </div>
      <button class="btn-icon" style="flex-shrink:0;margin-left:8px;" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" style="justify-content:space-between;">
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-danger" id="deleteBtn" onclick="deleteCurrentEvent()">🗑 삭제</button>
        <button class="btn btn-ghost" id="editBtn" onclick="editCurrentEvent()">✏️ 수정</button>
      </div>
      <button class="btn btn-primary" onclick="closeModal('detailModal')">닫기</button>
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
// Auto-detect API base: empty string = same origin (production), or set explicitly
const API_BASE = '';

// ==================== STATE ====================
let events = [];
let currentView = 'week';
let currentDate = new Date();
let miniCalDate = new Date();
let currentEventId = null;
let editingEventId = null;
let selectedPriority = 'mid';

const DAYS_KO = ['일','월','화','수','목','금','토'];
const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

// ==================== API ====================
function setSaveStatus(state, text) {
  const dot = document.getElementById('saveDot');
  const txt = document.getElementById('saveText');
  dot.className = 'save-dot' + (state === 'saving' ? ' saving' : state === 'error' ? ' error' : '');
  txt.textContent = text;
}

async function apiFetch(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json' },
    ...options
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadEvents() {
  try {
    setSaveStatus('saving', '로딩 중...');
    events = await apiFetch('/api/events');
    setSaveStatus('ok', `${events.length}개 일정`);
    renderAll();
  } catch(e) {
    setSaveStatus('error', '서버 연결 실패');
    showToast('❌ 서버에 연결할 수 없습니다');
  }
}

async function apiCreate(event) {
  setSaveStatus('saving', '저장 중...');
  try {
    const saved = await apiFetch('/api/events', { method: 'POST', body: JSON.stringify(event) });
    events.push(saved);
    setSaveStatus('ok', `${events.length}개 일정`);
    return saved;
  } catch(e) {
    setSaveStatus('error', '저장 실패');
    throw e;
  }
}

async function apiUpdate(id, event) {
  setSaveStatus('saving', '수정 중...');
  try {
    const saved = await apiFetch(`/api/events/${id}`, { method: 'PUT', body: JSON.stringify(event) });
    const idx = events.findIndex(e => e.id === id);
    if (idx >= 0) events[idx] = saved;
    setSaveStatus('ok', `${events.length}개 일정`);
    return saved;
  } catch(e) {
    setSaveStatus('error', '수정 실패');
    throw e;
  }
}

async function apiDelete(id) {
  setSaveStatus('saving', '삭제 중...');
  try {
    await apiFetch(`/api/events/${id}`, { method: 'DELETE' });
    events = events.filter(e => e.id !== id);
    setSaveStatus('ok', `${events.length}개 일정`);
  } catch(e) {
    setSaveStatus('error', '삭제 실패');
    throw e;
  }
}

// ==================== UTILS ====================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtTime(h, m) { return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; }
function parseTime(str) { if (!str) return null; const [h,m] = str.split(':').map(Number); return h*60+m; }
function today() { return fmtDate(new Date()); }
function showToast(msg, duration=2500) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, duration);
}

// ==================== AI ====================
function classifyPriority(title, note='') {
  const text = (title+' '+note).toLowerCase();
  const hi = ['긴급','urgent','중요','important','마감','deadline','발표','asap','critical','필수','주요'];
  const lo = ['점심','lunch','휴식','break','개인','personal','optional','자유','산책'];
  if (hi.some(k=>text.includes(k))) return 'high';
  if (lo.some(k=>text.includes(k))) return 'low';
  return 'mid';
}

function nlParse(text) {
  const now = new Date();
  let targetDate = new Date(now);
  let title = text, timeStr = null, endTimeStr = null;

  if (/오늘/.test(text)) { title=title.replace('오늘','').trim(); }
  else if (/내일/.test(text)) { targetDate.setDate(targetDate.getDate()+1); title=title.replace('내일','').trim(); }
  else if (/모레/.test(text)) { targetDate.setDate(targetDate.getDate()+2); title=title.replace('모레','').trim(); }
  else if (/다음\s*주/.test(text)) { targetDate.setDate(targetDate.getDate()+7); title=title.replace(/다음\s*주/,'').trim(); }

  const dayMatch = text.match(/(월|화|수|목|금|토|일)요일/);
  if (dayMatch) {
    const dm={월:1,화:2,수:3,목:4,금:5,토:6,일:0};
    let diff=dm[dayMatch[1]]-new Date().getDay(); if(diff<=0)diff+=7;
    targetDate=new Date(); targetDate.setDate(targetDate.getDate()+diff);
    title=title.replace(dayMatch[0],'').trim();
  }

  const afPm=text.match(/오후\s*(\d+)시(?:\s*(\d+)분)?/);
  const am=text.match(/오전\s*(\d+)시(?:\s*(\d+)분)?/);
  const h24=text.match(/(\d{1,2})시(?:\s*(\d+)분)?/);

  if (afPm) { let h=parseInt(afPm[1]); if(h<12)h+=12; timeStr=fmtTime(h,parseInt(afPm[2]||0)); title=title.replace(afPm[0],'').trim(); }
  else if (am) { let h=parseInt(am[1]); if(h===12)h=0; timeStr=fmtTime(h,parseInt(am[2]||0)); title=title.replace(am[0],'').trim(); }
  else if (h24) { const h=parseInt(h24[1]); if(h<=23){timeStr=fmtTime(h,parseInt(h24[2]||0)); title=title.replace(h24[0],'').trim();} }

  const dur=text.match(/(\d+)시간(?:\s*(\d+)분)?/);
  const min=text.match(/(\d+)분/);
  if (dur && timeStr) {
    const [h,m]=timeStr.split(':').map(Number);
    const tot=h*60+m+parseInt(dur[1])*60+parseInt(dur[2]||0);
    endTimeStr=fmtTime(Math.floor(tot/60)%24,tot%60);
    title=title.replace(dur[0],'').trim();
  } else if (min && timeStr) {
    const [h,m]=timeStr.split(':').map(Number);
    const tot=h*60+m+parseInt(min[1]);
    endTimeStr=fmtTime(Math.floor(tot/60)%24,tot%60);
    title=title.replace(min[0],'').trim();
  }
  title=title.replace(/[,·]/g,'').replace(/\s+/g,' ').trim();
  if (!title) return null;
  return { title, date: fmtDate(targetDate), time: timeStr, endTime: endTimeStr };
}

function parseNL() {
  const input = document.getElementById('nlInput').value.trim();
  if (!input) return;
  const result = nlParse(input);
  const resDiv = document.getElementById('nlParseResult');
  if (result) {
    document.getElementById('eventTitle').value = result.title;
    if (result.date) document.getElementById('eventDate').value = result.date;
    if (result.time) document.getElementById('eventTime').value = result.time;
    if (result.endTime) document.getElementById('eventEndTime').value = result.endTime;
    const p = classifyPriority(result.title);
    selectPriority(p);
    const pLabel = {high:'높음',mid:'중간',low:'낮음'};
    resDiv.style.display='block';
    resDiv.innerHTML=`✅ <strong>${result.title}</strong> · ${result.date||''} ${result.time||''} · ${pLabel[p]}`;
  } else {
    resDiv.style.display='block'; resDiv.textContent='❌ 파싱 실패. 직접 입력해주세요.';
  }
}

function generateSummary(dateStr) {
  const evts = events.filter(e=>e.date===dateStr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const isToday = dateStr===today();
  const label = isToday?'오늘':dateStr;
  if (!evts.length) return `${label}은 일정이 없어요. ➕ 새 일정을 추가해 보세요!`;
  const hi=evts.filter(e=>e.priority==='high'), mi=evts.filter(e=>e.priority==='mid'), lo=evts.filter(e=>e.priority==='low');
  let s=`${label} 총 <strong>${evts.length}개</strong> 일정<br>`;
  if(hi.length) s+=`🔴 긴급 ${hi.length}개: ${hi.map(e=>e.title).join(', ')}<br>`;
  if(mi.length) s+=`🟡 중간 ${mi.length}개<br>`;
  if(lo.length) s+=`🟢 여유 ${lo.length}개`;
  const wt=evts.filter(e=>e.time);
  if(wt.length) s+=`<br>📌 ${wt[0].time} 시작`;
  return s;
}

function generateRecommendations(dateStr) {
  const evts = events.filter(e=>e.date===dateStr&&e.time).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const busy = new Set();
  evts.forEach(e=>{const s=parseTime(e.time),en=parseTime(e.endTime)||s+60; for(let m=s;m<en;m+=30)busy.add(m);});
  const free=[];
  for(let h=9;h<=18;h++){const m=h*60; if(!busy.has(m)&&!busy.has(m+30))free.push(fmtTime(h,0));}
  let html='';
  if(events.filter(e=>e.date===dateStr&&e.priority==='high').length) html+=`<div class="reco-item">⚡ 긴급 일정이 있습니다. 미리 준비하세요.</div>`;
  if(free.length) html+=`<div class="reco-item">🕐 집중 작업 추천: <strong>${free.slice(0,2).join(', ')}</strong></div>`;
  if(!evts.length) html+=`<div class="reco-item">✨ 오늘은 여유롭습니다. 중요 업무에 집중하기 좋아요!</div>`;
  const tom=new Date(dateStr); tom.setDate(tom.getDate()+1);
  if(!events.filter(e=>e.date===fmtDate(tom)).length) html+=`<div class="reco-item">📅 내일은 일정 없음. 미뤄둔 업무 배치 추천!</div>`;
  return html||'<div class="reco-item">분석할 데이터가 없습니다.</div>';
}

function renderPriorityBreakdown() {
  const ws=getWeekStart(currentDate), we=new Date(ws); we.setDate(we.getDate()+6);
  const wevts=events.filter(e=>{const d=new Date(e.date+'T00:00:00'); return d>=ws&&d<=we;});
  const el=document.getElementById('priorityBreakdown');

  const hi=wevts.filter(e=>e.priority==='high').length,mi=wevts.filter(e=>e.priority==='mid').length,lo=wevts.filter(e=>e.priority==='low').length;
  el.innerHTML=`<div style="display:flex;gap:4px;height:6px;border-radius:3px;overflow:hidden;margin-bottom:8px;">
    <div style="flex:${hi||0.01};background:var(--high);"></div><div style="flex:${mi||0.01};background:var(--mid);"></div><div style="flex:${lo||0.01};background:var(--low);"></div>
  </div>
  <div style="display:flex;justify-content:space-between;color:var(--text-muted);">
    <span>🔴 <strong style="color:var(--high)">${hi}</strong></span><span>🟡 <strong style="color:#b76400">${mi}</strong></span><span>🟢 <strong style="color:var(--low)">${lo}</strong></span>
  </div>
  <div style="text-align:center;margin-top:4px;color:var(--text-muted);">이번 주 총 ${wevts.length}개</div>`;
}

// ==================== VIEWS ====================
function getWeekStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());r.setHours(0,0,0,0);return r;}
function setView(v){currentView=v;['month','week','day'].forEach(t=>document.getElementById('tab-'+t).className='view-tab'+(t===v?' active':''));renderCalendar();}
function navigatePrev(){if(currentView==='day')currentDate.setDate(currentDate.getDate()-1);else if(currentView==='week')currentDate.setDate(currentDate.getDate()-7);else currentDate.setMonth(currentDate.getMonth()-1);renderAll();}
function navigateNext(){if(currentView==='day')currentDate.setDate(currentDate.getDate()+1);else if(currentView==='week')currentDate.setDate(currentDate.getDate()+7);else currentDate.setMonth(currentDate.getMonth()+1);renderAll();}
function goToday(){currentDate=new Date();renderAll();}

function updateViewTitle(){
  const y=currentDate.getFullYear(),m=MONTHS_KO[currentDate.getMonth()];
  let title='';
  if(currentView==='month')title=`${y}년 ${m}`;
  else if(currentView==='week'){const ws=getWeekStart(currentDate),we=new Date(ws);we.setDate(we.getDate()+6);title=`${y}년 ${m} ${ws.getDate()}일 – ${we.getDate()}일`;}
  else title=`${y}년 ${m} ${currentDate.getDate()}일 (${DAYS_KO[currentDate.getDay()]})`;
  document.getElementById('viewTitle').textContent=title;
}

function renderCalendar(){
  const v=document.getElementById('calendarView');
  if(currentView==='day')renderDayView(v);
  else if(currentView==='week')renderWeekView(v);
  else renderMonthView(v);
  updateViewTitle();
}

function renderDayView(container){
  const ds=fmtDate(currentDate), evts=events.filter(e=>e.date===ds);
  let html='<div class="day-view"><div class="day-grid"><div class="day-time-col">';
  for(let h=0;h<24;h++) html+=`<div class="day-time-slot">${h===0?'':(h<12?h+'am':h===12?'12pm':(h-12)+'pm')}</div>`;
  html+='</div><div class="day-events-col" style="position:relative;">';
  for(let h=0;h<24;h++) html+=`<div class="day-hour-row" onclick="openAddModalWithDate('${ds}','${fmtTime(h,0)}')"></div>`;
  evts.filter(e=>e.time).forEach(e=>{
    const s=parseTime(e.time),en=e.endTime?parseTime(e.endTime):s+60;
    const top=(s/60)*60, height=Math.max(((en-s)/60)*60,22);
    html+=`<div class="event-block priority-${e.priority}" style="top:${top}px;height:${height}px;" onclick="showDetail('${e.id}');event.stopPropagation();">${e.time} ${e.title}</div>`;
  });
  html+='</div></div></div>';
  container.innerHTML=html;
}

function renderWeekView(container){
  const ws=getWeekStart(currentDate),ts=today();
  let html='<div class="week-grid"><div class="week-header-cell" style="border-right:1px solid var(--border);position:sticky;top:0;background:white;z-index:3;"></div>';
  for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);const isT=fmtDate(d)===ts;
    html+=`<div class="week-header-cell${isT?' is-today':''}"><div class="dow">${DAYS_KO[d.getDay()]}</div><div class="date-num">${d.getDate()}</div></div>`;}
  for(let h=6;h<22;h++){
    html+=`<div class="week-time-cell">${h<12?h+'am':h===12?'12pm':(h-12)+'pm'}</div>`;
    for(let i=0;i<7;i++){
      const d=new Date(ws);d.setDate(d.getDate()+i);const ds=fmtDate(d),ts2=fmtTime(h,0);
      const slotEvts=events.filter(e=>e.date===ds&&e.time&&parseTime(e.time)>=h*60&&parseTime(e.time)<(h+1)*60);
      html+=`<div class="week-day-cell" onclick="openAddModalWithDate('${ds}','${ts2}')">`;
      slotEvts.forEach(e=>{html+=`<div class="week-event priority-${e.priority}" onclick="showDetail('${e.id}');event.stopPropagation();" title="${e.title}">${e.title}</div>`;});
      html+='</div>';
    }
  }
  html+='</div>'; container.innerHTML=html;
}

function renderMonthView(container){
  const y=currentDate.getFullYear(),m=currentDate.getMonth(),ts=today();
  const first=new Date(y,m,1),last=new Date(y,m+1,0),startDow=first.getDay();
  let html='<div class="month-grid">';
  DAYS_KO.forEach(d=>html+=`<div class="month-dow">${d}</div>`);
  for(let i=0;i<startDow;i++){const d=new Date(y,m,1-startDow+i);html+=`<div class="month-day other-month"><div class="day-num">${d.getDate()}</div></div>`;}
  for(let d=1;d<=last.getDate();d++){
    const ds=fmtDate(new Date(y,m,d)),isT=ds===ts;
    const evts=events.filter(e=>e.date===ds).sort((a,b)=>({high:0,mid:1,low:2}[a.priority]-{high:0,mid:1,low:2}[b.priority]));
    html+=`<div class="month-day${isT?' is-today':''}" onclick="openAddModalWithDate('${ds}')"><div class="day-num">${d}</div>`;
    evts.slice(0,3).forEach(e=>{html+=`<div class="month-event priority-${e.priority}" onclick="showDetail('${e.id}');event.stopPropagation();" title="${e.title}">${e.time?e.time+' ':''}${e.title}</div>`;});
    if(evts.length>3) html+=`<div class="more-events">+${evts.length-3}개</div>`;
    html+='</div>';
  }
  const rem=Math.ceil((startDow+last.getDate())/7)*7-(startDow+last.getDate());
  for(let i=1;i<=rem;i++) html+=`<div class="month-day other-month"><div class="day-num">${i}</div></div>`;
  html+='</div>'; container.innerHTML=html;
}

  openAddModal();

    document.getElementById('eventTime').value=timeStr;
    const [h,mn]=timeStr.split(':').map(Number),tot=h*60+mn+60;
    document.getElementById('eventEndTime').value=fmtTime(Math.floor(tot/60)%24,tot%60);
  }

function closeModal(id){document.getElementById(id).style.display='none';}
function closeModalOnOverlay(e){if(e.target===e.currentTarget)closeModal(e.currentTarget.id);}
function selectPriority(p){
  selectedPriority=p;
  ['high','mid','low'].forEach(x=>{document.getElementById('pri-'+x).className=`priority-btn ${x}${x===p?' active':''}`;});
}

async function saveEvent(){
  const title=document.getElementById('eventTitle').value.trim();
  const date=document.getElementById('eventDate').value;
  if(!title){showToast('⚠️ 제목을 입력해 주세요');return;}
  if(!date){showToast('⚠️ 날짜를 선택해 주세요');return;}
  const saveBtn=document.getElementById('saveBtn');
  saveBtn.disabled=true; saveBtn.textContent='저장 중...';
  try {
    const evt={
      id: editingEventId||uid(), title, date,
      time: document.getElementById('eventTime').value||null,
      endTime: document.getElementById('eventEndTime').value||null,
      location: document.getElementById('eventLocation').value.trim()||null,
      note: document.getElementById('eventNote').value.trim()||null,
      priority: selectedPriority
    };
    if(editingEventId){ await apiUpdate(editingEventId,evt); }
    else { await apiCreate(evt); }
    closeModal('addModal');
    renderAll();
    showToast(editingEventId?'✅ 일정이 수정되었습니다':'✅ 일정이 추가되었습니다');
  } catch(e){ showToast('❌ 저장에 실패했습니다'); }
  finally { saveBtn.disabled=false; saveBtn.textContent='저장'; }
}

function showDetail(id){
  const e=events.find(ev=>ev.id===id);
  if(!e)return;
  currentEventId=id;
  const tagBg={high:'var(--high-bg)',mid:'var(--mid-bg)',low:'var(--low-bg)'};
  const tagClr={high:'var(--high)',mid:'#b76400',low:'var(--low)'};
  const tagLbl={high:'🔴 높음',mid:'🟡 중간',low:'🟢 낮음'};
  const tag=document.getElementById('detailTag');
  tag.textContent=tagLbl[e.priority]; tag.style.background=tagBg[e.priority]; tag.style.color=tagClr[e.priority];
  document.getElementById('detailTitle').textContent=e.title;
  const d=new Date(e.date+'T00:00:00');
  let body=`<div class="detail-row"><span class="detail-icon">📅</span><div><div class="detail-label">날짜</div>${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS_KO[d.getDay()]})</div></div>`;
  if(e.time) body+=`<div class="detail-row"><span class="detail-icon">🕐</span><div><div class="detail-label">시간</div>${e.time}${e.endTime?' – '+e.endTime:''}</div></div>`;
  if(e.location) body+=`<div class="detail-row"><span class="detail-icon">📍</span><div><div class="detail-label">장소</div>${e.location}</div></div>`;
  if(e.note) body+=`<div class="detail-row"><span class="detail-icon">📝</span><div><div class="detail-label">메모</div>${e.note}</div></div>`;
  const insight=getEventInsight(e);
  body+=`<div style="background:var(--accent-light);border:1px solid #c5d2fc;border-radius:8px;padding:10px 12px;margin-top:4px;font-size:12px;color:#374499;"><strong>🤖 AI 인사이트:</strong> ${insight}</div>`;
  document.getElementById('detailBody').innerHTML=body;

  // Enable buttons explicitly
  document.getElementById('deleteBtn').disabled=false;
  document.getElementById('editBtn').disabled=false;
  document.getElementById('detailModal').style.display='flex';
}

function getEventInsight(e){
  const ins=[];
  if(e.priority==='high') ins.push('긴급 일정입니다. 충분히 준비하세요.');
  const same=events.filter(ev=>ev.date===e.date&&ev.id!==e.id);
  if(same.length>=4) ins.push('당일 일정이 많습니다. 시간 관리에 주의하세요.');
  else if(same.length===0) ins.push('이 날은 여유 있는 하루입니다.');
  if(e.time){const h=parseInt(e.time.split(':')[0]);
    if(h>=9&&h<=11) ins.push('오전 집중 시간대 — 중요 업무에 최적입니다.');
    else if(h>=14&&h<=16) ins.push('오후 협업 시간대입니다.');
    else if(h>=18) ins.push('저녁 일정입니다. 휴식도 확보하세요.');}
  return ins.length?ins.join(' '):'특별한 인사이트가 없습니다.';
}

async function deleteCurrentEvent(){
  if(!currentEventId) return;
  if(!confirm('이 일정을 삭제할까요?')) return;
  const btn=document.getElementById('deleteBtn');
  btn.disabled=true; btn.textContent='삭제 중...';
  try {
    await apiDelete(currentEventId);
    closeModal('detailModal');
    renderAll();
    showToast('🗑 일정이 삭제되었습니다');
  } catch(e){ showToast('❌ 삭제에 실패했습니다'); btn.disabled=false; btn.textContent='🗑 삭제'; }
}

async function editCurrentEvent(){
  const e=events.find(ev=>ev.id===currentEventId);
  if(!e) return;
  closeModal('detailModal');
  editingEventId=e.id;
  document.getElementById('modalTitle').textContent='일정 수정';
  document.getElementById('eventTitle').value=e.title;
  document.getElementById('eventDate').value=e.date;
  document.getElementById('eventTime').value=e.time||'';
  document.getElementById('eventEndTime').value=e.endTime||'';
  document.getElementById('eventLocation').value=e.location||'';
  document.getElementById('eventNote').value=e.note||'';
  document.getElementById('nlInput').value='';
  document.getElementById('nlParseResult').style.display='none';
  selectPriority(e.priority||'mid');
  document.getElementById('addModal').style.display='flex';
}

// ==================== RENDER ALL ====================
function renderAll(){
  renderMiniCal();
  renderCalendar();
  renderPriorityBreakdown();
  const ds=fmtDate(currentDate);
  document.getElementById('aiSummaryText').innerHTML=generateSummary(ds);
  document.getElementById('aiRecoText').innerHTML=generateRecommendations(ds);
}

// ==================== INIT ====================
loadEvents();
</script>
