[build]
  publish = "static"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# GitHub Pages에서 사용하는 iCloud CalDAV 프록시
[[redirects]]
  from = "/api/icloud/*"
  to = "/.netlify/functions/icloud/:splat"
  status = 200
  force = true

# /api/* → serverless function으로 라우팅
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback (새로고침 시 index.html 반환)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
